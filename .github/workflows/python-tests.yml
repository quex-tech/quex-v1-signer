name: Python Tests

on:
  pull_request:  # Also run on every pull request, regardless of the target branch

jobs:
  test:
    runs-on: ubuntu-latest  # Use the latest version of Ubuntu as the runner

    strategy:
      matrix:
        python-version: [3.11]  # Test on multiple Python versions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3  # Checkout the repository code

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}  # Use the specified Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip  # Upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi  # Install from requirements.txt if it exists

      - name: Run tests
        run: |
          pytest  # Use pytest to run your tests

      - name: Upload test results
        if: failure()  # This step runs only if tests fail
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: ./test-results/  # Specify where to store test results
